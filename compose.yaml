services:

  web:
    build: .
    ports:
      - "8080:80"

    depends_on:
      - db

  db:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "escuela"

    volumes:
      - datos_mysql:/var/lib/mysql
      - ./crear_bd.sql:/docker-entrypoint-initdb.d/crear_bd.sql

volumes:
  datos_mysql: